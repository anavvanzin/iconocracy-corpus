<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="Gentium, serif">
  <!-- === Disciplina Cartográfica · Pipeline metodológico Iconocracia === -->
  <!-- Paleta: bordô institucional #6b1e2e · creme #f4ece0 · grafite #1c1c1c · ouro #b8892b · cinza lápis #6b6459 -->

  <defs>
    <!-- Grão sutil no fundo -->
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.11
                             0 0 0 0 0.11
                             0 0 0 0 0.11
                             0 0 0 0.04 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Zona mutável: fundo creme -->
    <linearGradient id="zona-mutavel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4ece0"/>
      <stop offset="100%" stop-color="#ecdfc9"/>
    </linearGradient>

    <!-- Zona analítica: fundo bordô pálido -->
    <linearGradient id="zona-analitica" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8d4d7"/>
      <stop offset="100%" stop-color="#dcbfc4"/>
    </linearGradient>

    <!-- Sombra discreta para os nós -->
    <filter id="sombra" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Seta ornamental -->
    <marker id="seta" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b6459"/>
    </marker>
  </defs>

  <!-- Fundo geral -->
  <rect width="1600" height="900" fill="#faf6ec"/>
  <rect width="1600" height="900" fill="#faf6ec" filter="url(#grain)"/>

  <!-- Título e metadata -->
  <g>
    <text x="80" y="75" font-size="38" font-weight="bold" fill="#1c1c1c" letter-spacing="1">
      Pipeline metodológico
    </text>
    <text x="80" y="115" font-size="22" font-style="italic" fill="#6b1e2e" letter-spacing="0.5">
      Iconocracia · tese PPGD/UFSC · METHOD-001 · v1.0
    </text>
    <line x1="80" y1="135" x2="520" y2="135" stroke="#b8892b" stroke-width="2"/>
  </g>

  <!-- Metadados à direita -->
  <g font-size="12" fill="#6b6459" text-anchor="end" font-family="DejaVu Sans Mono, monospace">
    <text x="1520" y="75">teoria → codebook → amostragem → piloto → confiabilidade → FREEZE → análise</text>
    <text x="1520" y="95">2026-04-23 · Ana Vanzin · regra: nenhuma inferência antes do freeze</text>
  </g>

  <!-- =====  FAIXAS DE ZONA  ===== -->
  <!-- Zona 1: construção da capta (etapas I–V) -->
  <rect x="60" y="200" width="1000" height="500" rx="12" fill="url(#zona-mutavel)" stroke="#c9b898" stroke-width="1.5"/>
  <text x="80" y="240" font-size="16" font-weight="bold" fill="#6b6459" letter-spacing="3">
    ZONA I · CAPTA EM CONSTRUÇÃO
  </text>
  <text x="80" y="262" font-size="13" font-style="italic" fill="#6b6459">
    mutável · revisões permitidas · changelog obrigatório a cada iteração
  </text>

  <!-- Zona 2: freeze + análise -->
  <rect x="1080" y="200" width="460" height="500" rx="12" fill="url(#zona-analitica)" stroke="#b8948c" stroke-width="1.5"/>
  <text x="1100" y="240" font-size="16" font-weight="bold" fill="#6b1e2e" letter-spacing="3">
    ZONA II · ANÁLISE SUBSTANTIVA
  </text>
  <text x="1100" y="262" font-size="13" font-style="italic" fill="#6b1e2e">
    inferências autorizadas · dataset selado · claims publicáveis
  </text>

  <!-- =====  CONECTORES  ===== -->
  <!-- Setas entre os nós (curvas sutis) -->
  <g stroke="#6b6459" stroke-width="2" fill="none" marker-end="url(#seta)">
    <path d="M 205 470 L 335 470"/>
    <path d="M 485 470 L 615 470"/>
    <path d="M 765 470 L 895 470"/>
    <path d="M 1045 470 L 1175 470"/>
  </g>
  <!-- Seta que atravessa a barreira do freeze (mais destacada) -->
  <g stroke="#6b1e2e" stroke-width="3" fill="none" marker-end="url(#seta)">
    <path d="M 1325 470 L 1425 470"/>
  </g>

  <!-- =====  NÓS · cada etapa  ===== -->

  <!-- I · Teoria -->
  <g filter="url(#sombra)">
    <circle cx="135" cy="470" r="70" fill="#f4ece0" stroke="#6b1e2e" stroke-width="2.5"/>
    <text x="135" y="435" text-anchor="middle" font-size="14" font-style="italic" fill="#b8892b" letter-spacing="2">I</text>
    <text x="135" y="470" text-anchor="middle" font-size="20" font-weight="bold" fill="#1c1c1c">Teoria</text>
    <text x="135" y="495" text-anchor="middle" font-size="11" font-style="italic" fill="#6b6459">fundamentar</text>
  </g>
  <g font-size="11" fill="#6b6459" text-anchor="middle" font-family="DejaVu Sans Mono, monospace">
    <text x="135" y="575">Warburg · Panofsky</text>
    <text x="135" y="590">Drucker · Vismann</text>
    <text x="135" y="605">Legendre · Jay</text>
  </g>
  <text x="135" y="640" text-anchor="middle" font-size="13" font-style="italic" fill="#6b1e2e">→ moldura conceitual</text>

  <!-- II · Codebook -->
  <g filter="url(#sombra)">
    <circle cx="415" cy="470" r="70" fill="#f4ece0" stroke="#6b1e2e" stroke-width="2.5"/>
    <text x="415" y="435" text-anchor="middle" font-size="14" font-style="italic" fill="#b8892b" letter-spacing="2">II</text>
    <text x="415" y="470" text-anchor="middle" font-size="20" font-weight="bold" fill="#1c1c1c">Codebook</text>
    <text x="415" y="495" text-anchor="middle" font-size="11" font-style="italic" fill="#6b6459">operacionalizar</text>
  </g>
  <g font-size="11" fill="#6b6459" text-anchor="middle" font-family="DejaVu Sans Mono, monospace">
    <text x="415" y="575">LPAI v2 · Iconclass</text>
    <text x="415" y="590">Pathosformel catalog</text>
    <text x="415" y="605">subaltern_caution</text>
  </g>
  <text x="415" y="640" text-anchor="middle" font-size="13" font-style="italic" fill="#6b1e2e">→ capta declarada</text>

  <!-- III · Amostragem -->
  <g filter="url(#sombra)">
    <circle cx="695" cy="470" r="70" fill="#f4ece0" stroke="#6b1e2e" stroke-width="2.5"/>
    <text x="695" y="435" text-anchor="middle" font-size="14" font-style="italic" fill="#b8892b" letter-spacing="2">III</text>
    <text x="695" y="470" text-anchor="middle" font-size="20" font-weight="bold" fill="#1c1c1c">Amostragem</text>
    <text x="695" y="495" text-anchor="middle" font-size="11" font-style="italic" fill="#6b6459">delimitar</text>
  </g>
  <g font-size="11" fill="#6b6459" text-anchor="middle" font-family="DejaVu Sans Mono, monospace">
    <text x="695" y="575">1800–2000 · 17 países</text>
    <text x="695" y="590">core · comparador</text>
    <text x="695" y="605">moedas · selos · etc.</text>
  </g>
  <text x="695" y="640" text-anchor="middle" font-size="13" font-style="italic" fill="#6b1e2e">→ 165 itens</text>

  <!-- IV · Piloto -->
  <g filter="url(#sombra)">
    <circle cx="975" cy="470" r="70" fill="#f4ece0" stroke="#6b1e2e" stroke-width="2.5"/>
    <text x="975" y="435" text-anchor="middle" font-size="14" font-style="italic" fill="#b8892b" letter-spacing="2">IV</text>
    <text x="975" y="470" text-anchor="middle" font-size="20" font-weight="bold" fill="#1c1c1c">Piloto</text>
    <text x="975" y="495" text-anchor="middle" font-size="11" font-style="italic" fill="#6b6459">testar</text>
  </g>
  <g font-size="11" fill="#6b6459" text-anchor="middle" font-family="DejaVu Sans Mono, monospace">
    <text x="975" y="575">P-01 República</text>
    <text x="975" y="590">Armada BR 1889–1930</text>
    <text x="975" y="605">score ↔ prancha</text>
  </g>
  <text x="975" y="640" text-anchor="middle" font-size="13" font-style="italic" fill="#6b1e2e">→ 12 itens validados</text>

  <!-- V · Confiabilidade -->
  <g filter="url(#sombra)">
    <circle cx="1255" cy="470" r="70" fill="#f4ece0" stroke="#6b1e2e" stroke-width="2.5"/>
    <text x="1255" y="435" text-anchor="middle" font-size="14" font-style="italic" fill="#b8892b" letter-spacing="2">V</text>
    <text x="1255" y="472" text-anchor="middle" font-size="17" font-weight="bold" fill="#1c1c1c">Confiabilidade</text>
    <text x="1255" y="495" text-anchor="middle" font-size="11" font-style="italic" fill="#6b6459">medir</text>
  </g>
  <g font-size="11" fill="#6b6459" text-anchor="middle" font-family="DejaVu Sans Mono, monospace">
    <text x="1255" y="575">inter-rater (IRR)</text>
    <text x="1255" y="590">Kappa de Cohen</text>
    <text x="1255" y="605">n=30 · 2 codificadores</text>
  </g>
  <text x="1255" y="640" text-anchor="middle" font-size="13" font-style="italic" fill="#6b1e2e">→ κ &gt; 0.70</text>

  <!-- =====  LINHA DO FREEZE · barreira crítica  ===== -->
  <g>
    <!-- Gradiente vertical simbolizando selamento -->
    <line x1="1370" y1="180" x2="1370" y2="720" stroke="#6b1e2e" stroke-width="4" stroke-dasharray="6,4"/>
    <!-- Selo circular no topo -->
    <circle cx="1370" cy="175" r="28" fill="#6b1e2e" stroke="#b8892b" stroke-width="2"/>
    <text x="1370" y="183" text-anchor="middle" font-size="22" font-weight="bold" fill="#f4ece0">❋</text>
    <!-- Rótulo -->
    <g transform="translate(1370, 770)">
      <text text-anchor="middle" font-size="22" font-weight="bold" fill="#6b1e2e" letter-spacing="6">FREEZE</text>
      <text text-anchor="middle" y="22" font-size="11" font-style="italic" fill="#6b1e2e">ponto de não-retorno · dataset selado · versionado · publicável</text>
    </g>
  </g>

  <!-- VI · Análise (na Zona II) -->
  <g filter="url(#sombra)">
    <circle cx="1455" cy="470" r="70" fill="#6b1e2e" stroke="#b8892b" stroke-width="2.5"/>
    <text x="1455" y="435" text-anchor="middle" font-size="14" font-style="italic" fill="#f4ece0" letter-spacing="2">VI</text>
    <text x="1455" y="470" text-anchor="middle" font-size="20" font-weight="bold" fill="#f4ece0">Análise</text>
    <text x="1455" y="495" text-anchor="middle" font-size="11" font-style="italic" fill="#e8d4d7">inferir</text>
  </g>
  <g font-size="11" fill="#6b1e2e" text-anchor="middle" font-family="DejaVu Sans Mono, monospace">
    <text x="1455" y="575">atlas topológico</text>
    <text x="1455" y="590">Nachleben · Pathosformel</text>
    <text x="1455" y="605">score ↔ prancha (sempre)</text>
  </g>
  <text x="1455" y="640" text-anchor="middle" font-size="13" font-style="italic" fill="#6b1e2e">→ capítulos da tese</text>

  <!-- =====  RODAPÉ · regras  ===== -->
  <g font-size="14" fill="#1c1c1c">
    <line x1="80" y1="780" x2="1520" y2="780" stroke="#b8892b" stroke-width="1"/>
    <text x="80" y="815" font-weight="bold" fill="#6b1e2e">Regras do pipeline</text>
    <text x="80" y="840" font-size="13">
      <tspan font-weight="bold">1.</tspan> LPAI v2 é <tspan font-style="italic">capta</tspan> (Drucker 2011), não <tspan font-style="italic">data</tspan>.
      <tspan dx="20" font-weight="bold">2.</tspan> Mudança de indicador → nova versão + changelog.
      <tspan dx="20" font-weight="bold">3.</tspan> Nenhuma inferência substantiva antes do <tspan font-weight="bold" fill="#6b1e2e">freeze</tspan>.
    </text>
    <text x="80" y="862" font-size="13">
      <tspan font-weight="bold">4.</tspan> Todo score publicado vem pareado com ao menos uma prancha topológica.
      <tspan dx="20" font-weight="bold">5.</tspan> Figuras não-europeias exigem <tspan font-family="DejaVu Sans Mono, monospace">subaltern_caution</tspan>.
    </text>
  </g>

</svg>
