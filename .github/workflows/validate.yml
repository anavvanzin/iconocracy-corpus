name: Validate Schemas

on:
  push:
    paths:
      - 'corpus/**'
      - 'data/processed/**'
      - 'tools/schemas/**'
      - 'tools/scripts/**'
      - 'companion-data.json'
      - '.github/workflows/validate.yml'
  pull_request:
    paths:
      - 'corpus/**'
      - 'data/processed/**'
      - 'tools/schemas/**'
      - 'tools/scripts/**'
      - 'companion-data.json'
      - '.github/workflows/validate.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check records.jsonl exists
        run: |
          if [ ! -f data/processed/records.jsonl ]; then
            echo "::error::data/processed/records.jsonl not found — run csv_to_records.py to generate it"
            exit 1
          fi

      - name: Validate records.jsonl against master-record schema
        run: python tools/scripts/validate_schemas.py data/processed/records.jsonl --schema master-record --verbose

      - name: Validate purification.jsonl against purification-record schema
        run: python tools/scripts/validate_schemas.py data/processed/purification.jsonl --schema purification-record --verbose

      - name: Check records.jsonl / corpus-data.json consistency
        run: |
          RECORDS=$(python3 -c "
          with open('data/processed/records.jsonl') as f:
              lines = [l for l in f if l.strip()]
          print(len(lines))
          ")
          CORPUS=$(python3 -c "
          import json
          with open('corpus/corpus-data.json') as f:
              data = json.load(f)
          print(len(data))
          ")
          echo "records.jsonl: $RECORDS items | corpus-data.json: $CORPUS items"
          if [ "$RECORDS" -eq 0 ]; then
            echo "::error::records.jsonl is empty"
            exit 1
          fi
          if [ "$RECORDS" -ne "$CORPUS" ]; then
            echo "::error::records.jsonl / corpus-data.json count mismatch"
            exit 1
          fi

      - name: Validate traceability report
        run: python tools/scripts/trace_evidence.py data/processed/records.jsonl

      - name: Show purification status
        run: python tools/scripts/code_purification.py --status

- name: Reject binary files in data/raw/
        run: |
          BINARIES=$(find data/raw -type f ! -name '*.json' ! -name '*.md' ! -name '.gitkeep' || true)
          if [ -n \"$BINARIES\" ]; then
            echo \"::error::Binary files detected in data/raw/ — use Google Drive instead (ADR-001)\"
            echo \"$BINARIES\"
            exit 1
          fi

      - name: Run tests
        run: |
          pip install -r requirements.txt
          python -m pytest tests/ -q --tb=short
