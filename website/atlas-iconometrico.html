<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Atlas Iconométrico — ICONOCRACIA</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        bg: '#16131f',
        surface: '#1d1929',
        border: '#2e2a42',
        text: '#e8e4d8',
        muted: '#8a8699',
        gold: '#c9a84c',
        lavender: '#a490c2',
        silver: '#d4d0e0',
        r1bg: '#3d1f28', r1text: '#e8a0a8', r1border: '#7a3040',
        r2bg: '#1f2d3d', r2text: '#90b8e8', r2border: '#305878',
        r3bg: '#252535', r3text: '#b8b8d8', r3border: '#484868',
      },
      fontFamily: {
        mono: ['"Courier New"', 'Courier', 'monospace'],
        serif: ['Georgia', 'serif'],
      }
    }
  }
}
</script>
<style>
  body { background: #16131f; color: #e8e4d8; font-family: 'Courier New', monospace; margin: 0; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #1d1929; }
  ::-webkit-scrollbar-thumb { background: #2e2a42; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3e3a52; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;
const { RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, Radar, ResponsiveContainer } = Recharts;

const CORPUS = [
  { id:"BR-001", title:"Alegoria da Agricultura (RS)", date:"1908", country:"BR", medium:"Fotografia P&B", archive:"Brasiliana Fotográfica", regime:"1", img:"https://brasilianafotografica.bn.gov.br/brasiliana/bitstream/handle/20.500.12156.1/11778/0000001.JPG.jpg", indicators:{FEI:1,CII:2,PRI:2,SMI:0,SMS:1,AMCP:0,MVI:2,WI:0,RI:1,AI:2} },
  { id:"BR-002", title:"Monumento à República (Belém)", date:"1940", country:"BR", medium:"Monumento", archive:"Brasiliana Fotográfica", regime:"1", img:"https://brasilianafotografica.bn.gov.br/brasiliana/bitstream/handle/20.500.12156.1/13609/GV%20dvft%20004.JPG.jpg", indicators:{FEI:0,CII:3,PRI:3,SMI:3,SMS:2,AMCP:1,MVI:1,WI:1,RI:1,AI:3} },
  { id:"BR-005", title:"A República (Matriz Positivista)", date:"1889", country:"BR", medium:"Pintura", archive:"Museu Histórico Nacional", regime:"2", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/D%C3%A9cio_Villares_-_A_Rep%C3%BAblica.jpg/800px-D%C3%A9cio_Villares_-_A_Rep%C3%BAblica.jpg", indicators:{FEI:2,CII:3,PRI:2,SMI:1,SMS:2,AMCP:0,MVI:2,WI:1,RI:1,AI:3} },
  { id:"BR-006", title:"A Justiça (Ceschiatti — STF)", date:"1961", country:"BR", medium:"Escultura", archive:"Arquivo STF", regime:"2", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/A_Justi%C3%A7a_STF.jpg/800px-A_Justi%C3%A7a_STF.jpg", indicators:{FEI:1,CII:3,PRI:3,SMI:3,SMS:1,AMCP:0,MVI:0,WI:0,RI:1,AI:3} },
  { id:"FR-001", title:"Marianne (Emprunt 1917)", date:"1917", country:"FR", medium:"Cartaz", archive:"Gallica / Europeana", regime:"3", img:"https://gallica.bnf.fr/iiif/ark:/12148/btv1b10051217v/f1/full/full/0/native.jpg", indicators:{FEI:1,CII:2,PRI:2,SMI:0,SMS:3,AMCP:2,MVI:0,WI:2,RI:1,AI:2} },
  { id:"FR-003", title:"La Liberté guidant le peuple", date:"1830", country:"FR", medium:"Pintura", archive:"Louvre", regime:"1", img:"https://upload.wikimedia.org/wikipedia/commons/5/5d/Eug%C3%A8ne_Delacroix_-_Le_28_Juillet._La_Libert%C3%A9_guidant_le_peuple.jpg", indicators:{FEI:3,CII:1,PRI:2,SMI:0,SMS:3,AMCP:2,MVI:1,WI:3,RI:2,AI:2} },
  { id:"UK-003", title:"Lady Justice (Old Bailey)", date:"1907", country:"UK", medium:"Escultura", archive:"Central Criminal Court", regime:"2", img:"https://upload.wikimedia.org/wikipedia/commons/f/f4/Old_Bailey_Lady_Justice.jpg", indicators:{FEI:0,CII:3,PRI:3,SMI:3,SMS:1,AMCP:0,MVI:0,WI:2,RI:1,AI:3} },
  { id:"US-001", title:"Statue of Liberty", date:"1886", country:"US", medium:"Monumento", archive:"NPS", regime:"1", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Statue_of_Liberty_7.jpg/800px-Statue_of_Liberty_7.jpg", indicators:{FEI:0,CII:3,PRI:3,SMI:3,SMS:2,AMCP:2,MVI:0,WI:2,RI:1,AI:3} }
];

const INDICATOR_NAMES = {
  FEI: "Exposição da Carne",
  CII: "Idealização Clássica",
  PRI: "Rigidez Postural",
  SMI: "Materialidade Estatuária",
  SMS: "Serenidade/Militância",
  AMCP: "Presença de Armadura",
  MVI: "Visibilidade Maternal",
  WI: "Índice de Armamento",
  RI: "Racialização",
  AI: "Atemporalidade"
};

const REGIMES = {
  "1": { label: "I · FUNDACIONAL-SACRIFICIAL", short: "I·FUNDACIONAL", bg: "#3d1f28", text: "#e8a0a8", border: "#7a3040", stroke: "#e8a0a8", fill: "rgba(232,160,168,0.25)" },
  "2": { label: "II · NORMATIVO-JURÍDICO", short: "II·NORMATIVO", bg: "#1f2d3d", text: "#90b8e8", border: "#305878", stroke: "#90b8e8", fill: "rgba(144,184,232,0.25)" },
  "3": { label: "III · MILITAR-IMPERIAL", short: "III·MILITAR", bg: "#252535", text: "#b8b8d8", border: "#484868", stroke: "#b8b8d8", fill: "rgba(184,184,216,0.25)" }
};

const PANELS = [
  { id: "P1", label: "Mães Fundacionais", regime: "1" },
  { id: "P2", label: "Calcificação da Justitia", regime: "2" },
  { id: "P3", label: "Enrijecimento Tegumentar", regime: "3" },
  { id: "P4", label: "Hegemonia Marmórea", regime: null, focus: "RI" },
  { id: "P5", label: "Ubiquidade Íntima", regime: null, focus: "micro" }
];

function Dots({ value, color }) {
  return (
    <span className="flex gap-1 items-center">
      {[0,1,2].map(i => (
        <span key={i} style={{
          width: 8, height: 8, borderRadius: '50%', display: 'inline-block',
          background: i < value ? color : '#2e2a42',
          border: `1px solid ${i < value ? color : '#3e3a52'}`
        }}/>
      ))}
    </span>
  );
}

function ImageCard({ item, selected, onClick }) {
  const r = REGIMES[item.regime];
  return (
    <div
      onClick={onClick}
      className="cursor-pointer group transition-all duration-200"
      style={{
        background: '#1d1929',
        border: `1px solid ${selected ? r.border : '#2e2a42'}`,
        borderRadius: 6,
        overflow: 'hidden',
        boxShadow: selected ? `0 0 12px ${r.border}44` : 'none'
      }}
    >
      <div className="relative" style={{ height: 160, overflow: 'hidden' }}>
        <img
          src={item.img}
          alt={item.title}
          loading="lazy"
          className="w-full h-full object-cover transition-all duration-300"
          style={{ filter: 'grayscale(30%)', opacity: 0.85 }}
          onMouseOver={e => { e.currentTarget.style.filter = 'grayscale(0%)'; e.currentTarget.style.opacity = '1'; }}
          onMouseOut={e => { e.currentTarget.style.filter = 'grayscale(30%)'; e.currentTarget.style.opacity = '0.85'; }}
          onError={e => { e.currentTarget.style.display = 'none'; e.currentTarget.parentElement.style.background = r.bg; }}
        />
        <span
          className="absolute top-2 left-2 text-xs font-bold px-2 py-0.5 rounded"
          style={{ background: r.bg, color: r.text, border: `1px solid ${r.border}`, fontSize: 10 }}
        >
          {item.regime === "1" ? "I" : item.regime === "2" ? "II" : "III"}
        </span>
        <span
          className="absolute bottom-2 right-2 text-xs px-1.5 py-0.5 rounded"
          style={{ background: 'rgba(22,19,31,0.85)', color: '#8a8699', fontSize: 10 }}
        >
          {item.country} · {item.date}
        </span>
      </div>
      <div className="px-3 py-2">
        <div className="text-xs leading-tight" style={{ color: '#e8e4d8', fontSize: 11 }}>
          {item.title}
        </div>
        <div className="mt-1" style={{ color: '#8a8699', fontSize: 10 }}>
          {item.medium}
        </div>
      </div>
    </div>
  );
}

function DetailPanel({ item, onClose }) {
  if (!item) return null;
  const r = REGIMES[item.regime];
  const radarData = Object.entries(item.indicators).map(([key, val]) => ({
    indicator: key, value: val, fullMark: 3
  }));

  return (
    <div
      className="flex-shrink-0 overflow-y-auto"
      style={{
        width: 340, background: '#1d1929', borderLeft: `1px solid ${r.border}`,
        height: '100%', position: 'relative'
      }}
    >
      {/* Close button */}
      <button
        onClick={onClose}
        className="absolute top-3 right-3 z-10 w-7 h-7 flex items-center justify-center rounded-full transition-colors"
        style={{ background: 'rgba(22,19,31,0.7)', color: '#8a8699', border: '1px solid #2e2a42', fontSize: 14 }}
        onMouseOver={e => e.currentTarget.style.color = '#e8e4d8'}
        onMouseOut={e => e.currentTarget.style.color = '#8a8699'}
      >
        ×
      </button>

      {/* Header image */}
      <div className="relative" style={{ height: 200, overflow: 'hidden' }}>
        <img src={item.img} alt={item.title} className="w-full h-full object-cover"
          onError={e => { e.currentTarget.style.display = 'none'; e.currentTarget.parentElement.style.background = r.bg; }}
        />
        <div className="absolute inset-0" style={{
          background: `linear-gradient(to top, #1d1929 0%, transparent 50%)`
        }}/>
        <span
          className="absolute bottom-3 left-3 text-xs font-bold px-2 py-1 rounded"
          style={{ background: r.bg, color: r.text, border: `1px solid ${r.border}`, fontSize: 10 }}
        >
          {r.label}
        </span>
      </div>

      {/* Metadata */}
      <div className="px-4 pt-3 pb-2">
        <div className="text-sm font-bold" style={{ color: '#e8e4d8' }}>{item.title}</div>
        <div className="mt-1 space-y-0.5" style={{ fontSize: 11, color: '#8a8699' }}>
          <div>{item.date} · {item.country}</div>
          <div>{item.medium}</div>
          <div>{item.archive}</div>
        </div>
      </div>

      {/* Radar label */}
      <div className="px-4 mt-3 mb-1">
        <span className="text-xs tracking-widest" style={{ color: '#c9a84c', fontSize: 10, letterSpacing: '0.15em' }}>
          PERFIL ICONOMÉTRICO
        </span>
      </div>

      {/* Radar chart */}
      <div className="px-2" style={{ height: 240 }}>
        <ResponsiveContainer width="100%" height="100%">
          <RadarChart data={radarData} cx="50%" cy="50%" outerRadius="72%">
            <PolarGrid stroke="#2e2a42" />
            <PolarAngleAxis
              dataKey="indicator"
              tick={{ fill: '#8a8699', fontSize: 10, fontFamily: 'Courier New' }}
            />
            <PolarRadiusAxis
              angle={90} domain={[0, 3]} tickCount={4}
              tick={{ fill: '#3e3a52', fontSize: 8 }}
              axisLine={false}
            />
            <Radar
              dataKey="value" stroke={r.stroke} fill={r.fill}
              strokeWidth={2} dot={{ r: 3, fill: r.stroke }}
            />
          </RadarChart>
        </ResponsiveContainer>
      </div>

      {/* Indicator list */}
      <div className="px-4 pb-6 space-y-2">
        {Object.entries(item.indicators).map(([key, val]) => (
          <div key={key} className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span className="font-bold" style={{ color: '#c9a84c', fontSize: 10, width: 36 }}>{key}</span>
              <span style={{ color: '#8a8699', fontSize: 10 }}>{INDICATOR_NAMES[key]}</span>
            </div>
            <Dots value={val} color={r.text} />
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [filter, setFilter] = useState("all");
  const [selected, setSelected] = useState(null);

  const filtered = useMemo(() => {
    if (filter === "all") return CORPUS;
    return CORPUS.filter(c => c.regime === filter);
  }, [filter]);

  const countries = new Set(CORPUS.map(c => c.country));
  const dateRange = CORPUS.map(c => parseInt(c.date)).sort((a,b) => a-b);

  const filters = [
    { key: "all", label: "TODOS" },
    { key: "1", label: "I·FUNDACIONAL" },
    { key: "2", label: "II·NORMATIVO" },
    { key: "3", label: "III·MILITAR" }
  ];

  return (
    <div className="min-h-screen flex flex-col" style={{ background: '#16131f' }}>
      {/* HEADER */}
      <header className="px-6 pt-5 pb-3" style={{ borderBottom: '1px solid #2e2a42' }}>
        <div className="flex items-start justify-between">
          <div>
            <h1 className="font-serif text-3xl tracking-wide" style={{ color: '#e8e4d8', fontFamily: 'Georgia, serif', letterSpacing: '0.08em' }}>
              ATLAS ICONOMÉTRICO
            </h1>
            <p className="mt-1" style={{ color: '#8a8699', fontSize: 12, letterSpacing: '0.05em' }}>
              Contrato Sexual Visual — Iconocracia Jurídica Ocidental
            </p>
            <p className="mt-0.5" style={{ color: '#a490c2', fontSize: 11 }}>
              PPGD · UFSC · 2026
            </p>
          </div>
          <div className="text-right" style={{ fontSize: 11, color: '#8a8699' }}>
            <div><span style={{ color: '#c9a84c' }}>{CORPUS.length}</span> obras</div>
            <div><span style={{ color: '#c9a84c' }}>{countries.size}</span> países</div>
            <div><span style={{ color: '#c9a84c' }}>{dateRange[0]}–{dateRange[dateRange.length-1]}</span></div>
            <div><span style={{ color: '#c9a84c' }}>10</span> indicadores</div>
          </div>
        </div>
      </header>

      {/* FILTER BAR */}
      <div className="px-6 py-3 flex gap-2 flex-wrap" style={{ borderBottom: '1px solid #2e2a42' }}>
        {filters.map(f => {
          const active = filter === f.key;
          const regime = f.key !== "all" ? REGIMES[f.key] : null;
          return (
            <button
              key={f.key}
              onClick={() => setFilter(f.key)}
              className="px-3 py-1.5 rounded text-xs font-bold transition-all duration-200"
              style={{
                background: active ? (regime ? regime.bg : '#2e2a42') : 'transparent',
                color: active ? (regime ? regime.text : '#e8e4d8') : '#8a8699',
                border: `1px solid ${active ? (regime ? regime.border : '#c9a84c') : '#2e2a42'}`,
                fontSize: 11,
                letterSpacing: '0.05em'
              }}
            >
              {f.label}
            </button>
          );
        })}
        <span className="ml-auto self-center" style={{ fontSize: 10, color: '#8a8699' }}>
          {filtered.length} resultado{filtered.length !== 1 ? 's' : ''}
        </span>
      </div>

      {/* MAIN AREA */}
      <div className="flex flex-1 overflow-hidden">
        {/* IMAGE GRID */}
        <div className="flex-1 overflow-y-auto p-4">
          <div
            className="grid gap-4"
            style={{ gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))' }}
          >
            {filtered.map(item => (
              <ImageCard
                key={item.id}
                item={item}
                selected={selected?.id === item.id}
                onClick={() => setSelected(selected?.id === item.id ? null : item)}
              />
            ))}
          </div>

          {filtered.length === 0 && (
            <div className="text-center py-16" style={{ color: '#8a8699' }}>
              <div style={{ fontSize: 32, marginBottom: 8 }}>∅</div>
              <div style={{ fontSize: 12 }}>Nenhuma obra encontrada para este filtro.</div>
            </div>
          )}

          {/* ATLAS PANELS */}
          <div className="mt-6 pt-4" style={{ borderTop: '1px solid #2e2a42' }}>
            <div className="mb-2" style={{ fontSize: 10, color: '#8a8699', letterSpacing: '0.1em' }}>
              PAINÉIS DO ATLAS
            </div>
            <div className="flex flex-wrap gap-2">
              {PANELS.map(p => {
                const regime = p.regime ? REGIMES[p.regime] : null;
                return (
                  <span
                    key={p.id}
                    className="px-3 py-1.5 rounded cursor-default"
                    style={{
                      background: regime ? regime.bg : '#1d1929',
                      color: regime ? regime.text : '#c9a84c',
                      border: `1px solid ${regime ? regime.border : '#2e2a42'}`,
                      fontSize: 11
                    }}
                  >
                    <span className="font-bold">{p.id}</span>
                    <span className="mx-1" style={{ color: '#8a8699' }}>·</span>
                    {p.label}
                  </span>
                );
              })}
            </div>
          </div>
        </div>

        {/* DETAIL PANEL */}
        {selected && (
          <DetailPanel item={selected} onClose={() => setSelected(null)} />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
