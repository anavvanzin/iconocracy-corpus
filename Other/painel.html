<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PAINEL DA TESE — Iconocracia</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🎮</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  .font-pixel { font-family: 'Pixelify Sans', monospace; }
  .retro-panel {
    background-color: #ffeba1;
    border: 4px solid #854c30;
    box-shadow: inset -2px -2px 0px rgba(0,0,0,0.1), 4px 4px 0px #4d2b18;
    position: relative;
  }
  .retro-panel::before {
    content: '';
    position: absolute;
    top: 2px; left: 2px; right: 2px; bottom: 2px;
    border: 1px solid rgba(133, 76, 48, 0.3);
    pointer-events: none;
  }
  .retro-btn {
    font-family: 'Pixelify Sans', monospace;
    font-weight: 600;
    text-transform: uppercase;
    background-color: #f1c40f;
    color: #5c3a21;
    border: 3px solid #854c30;
    box-shadow: inset -2px -2px 0px rgba(0,0,0,0.2), 3px 3px 0px #4d2b18;
    transition: all 0.1s;
    border-radius: 0;
    cursor: pointer;
  }
  .retro-btn:active {
    box-shadow: inset 2px 2px 0px rgba(0,0,0,0.2), 0px 0px 0px #4d2b18;
    transform: translate(3px, 3px);
  }
  .custom-scrollbar::-webkit-scrollbar { width: 10px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: #e0d3b6; border-left: 2px solid #854c30; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: #854c30; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;

// --- Lucide icon helper (CDN version) ---
function Icon({name, size = 24, className = ""}) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) {
      ref.current.innerHTML = "";
      const svg = lucide.createElement(lucide.icons[name]);
      if (svg) {
        svg.setAttribute("width", size);
        svg.setAttribute("height", size);
        if (className) svg.setAttribute("class", className);
        ref.current.appendChild(svg);
      }
    }
  }, [name, size, className]);
  return <span ref={ref} style={{display:"inline-flex", verticalAlign:"middle"}} />;
}

function App() {
  // --- Pomodoro ---
  const [timeLeft, setTimeLeft] = useState(25 * 60);
  const [isActive, setIsActive] = useState(false);
  const [timerMode, setTimerMode] = useState('Trabalho');

  // --- Escrita ---
  const [wordCount, setWordCount] = useState(0);
  const [dailyGoal] = useState(500);
  const [draftText, setDraftText] = useState("");

  // --- Metas ---
  const [milestones, setMilestones] = useState([]);
  const [isLoading, setIsLoading] = useState(true);

  // --- Modo Foco ---
  const [focusMode, setFocusMode] = useState(false);

  const timerRef = useRef(null);
  const audioRef = useRef(null);

  // --- Pomodoro tick ---
  useEffect(() => {
    if (isActive && timeLeft > 0) {
      timerRef.current = setInterval(() => setTimeLeft((prev) => prev - 1), 1000);
    } else if (timeLeft === 0) {
      clearInterval(timerRef.current);
      setIsActive(false);
      // Visual + audio notification instead of alert()
      document.title = `\u23f0 ${timerMode} terminou!`;
      try { audioRef.current && audioRef.current.play(); } catch(e) {}
      if (timerMode === 'Trabalho') {
        setTimerMode('Pausa');
        setTimeLeft(5 * 60);
      } else {
        setTimerMode('Trabalho');
        setTimeLeft(25 * 60);
      }
    }
    return () => clearInterval(timerRef.current);
  }, [isActive, timeLeft, timerMode]);

  // --- Fetch milestones from API ---
  useEffect(() => {
    const fetchMilestones = async () => {
      try {
        const response = await fetch('/api/milestones');
        if (!response.ok) throw new Error('Falha na rede');
        const data = await response.json();
        setMilestones(data);
      } catch (error) {
        console.log('API indisponivel. Dados de fallback.');
        setMilestones([
          { id: 1, title: 'Revisar matriz Iconclass 48C51', deadline: '2026-04-06', completed: true },
          { id: 2, title: 'Redigir subcapitulo sobre Marianne vs. Justitia', deadline: '2026-04-12', completed: false },
          { id: 3, title: 'Exportar citacoes ABNT do Corpus', deadline: '2026-04-15', completed: false },
          { id: 4, title: 'Analise iconoclasta do STF (Jan 8)', deadline: '2026-04-25', completed: false },
          { id: 5, title: 'Finalizar Capitulo 3', deadline: '2026-05-10', completed: false }
        ]);
      } finally {
        setIsLoading(false);
      }
    };
    fetchMilestones();
  }, []);

  // --- Word count ---
  useEffect(() => {
    const words = draftText.trim().split(/\s+/).filter(w => w.length > 0).length;
    setWordCount(words);
  }, [draftText]);

  const toggleTimer = () => setIsActive(!isActive);
  const resetTimer = () => {
    setIsActive(false);
    setTimeLeft(timerMode === 'Trabalho' ? 25 * 60 : 5 * 60);
    document.title = 'PAINEL DA TESE \u2014 Iconocracia';
  };
  const switchMode = (mode) => {
    setIsActive(false);
    setTimerMode(mode);
    setTimeLeft(mode === 'Trabalho' ? 25 * 60 : 5 * 60);
  };
  const formatTime = (seconds) => {
    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
    const s = (seconds % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  };
  const toggleMilestone = (id) => {
    setMilestones(milestones.map(m => m.id === id ? { ...m, completed: !m.completed } : m));
  };

  // --- Urgent milestones (next 14 days) ---
  const todayDate = new Date();
  const urgentMilestones = milestones.filter(m => {
    if (m.completed) return false;
    const deadlineDate = new Date(m.deadline);
    const diffDays = Math.ceil((deadlineDate - todayDate) / (1000 * 60 * 60 * 24));
    return diffDays >= 0 && diffDays <= 14;
  }).sort((a, b) => new Date(a.deadline) - new Date(b.deadline));

  // --- FOCUS MODE ---
  if (focusMode) {
    return (
      <div className="fixed inset-0 z-50 bg-[#2d3436] flex flex-col text-[#f1c40f] font-pixel p-6">
        <div className="flex justify-between items-center mb-8">
          <div className="flex items-center gap-4">
            <div className="text-6xl font-bold tracking-widest bg-black/30 p-4 rounded-xl border-4 border-[#f1c40f]">
              {formatTime(timeLeft)}
            </div>
            <div className="flex flex-col gap-2">
              <button onClick={toggleTimer} className="px-4 py-2 bg-[#f1c40f] text-[#2d3436] font-bold border-2 border-[#f1c40f] hover:bg-[#e1b12c] transition-colors font-pixel">
                {isActive ? 'PAUSAR' : 'INICIAR'}
              </button>
              <button onClick={() => switchMode(timerMode === 'Trabalho' ? 'Pausa' : 'Trabalho')} className="px-4 py-2 border-2 border-[#f1c40f] hover:bg-white/10 transition-colors font-pixel">
                MUDAR MODO
              </button>
            </div>
          </div>
          <button onClick={() => setFocusMode(false)} className="flex items-center gap-2 px-4 py-2 bg-red-500 text-white border-4 border-red-700 hover:bg-red-600 transition-colors shadow-[4px_4px_0_0_#000] font-pixel">
            <Icon name="X" size={20} /> SAIR
          </button>
        </div>

        <div className="flex-1 flex flex-col w-full max-w-4xl mx-auto">
          <div className="flex justify-between items-end mb-2">
            <h2 className="text-2xl uppercase font-pixel">Manuscrito (Modo Foco)</h2>
            <span className="text-xl font-pixel">{wordCount} / {dailyGoal} palavras</span>
          </div>
          <textarea
            className="flex-1 w-full bg-[#1e272e] border-4 border-[#f1c40f] p-6 text-xl text-[#dfe6e9] focus:outline-none resize-none font-sans"
            placeholder="Comece a redigir a sua analise iconografica aqui..."
            value={draftText}
            onChange={(e) => setDraftText(e.target.value)}
          />
        </div>
      </div>
    );
  }

  // --- MAIN RENDER ---
  return (
    <div className="min-h-screen bg-[#7ba05b] p-4 md:p-8 font-sans" style={{ backgroundImage: 'radial-gradient(#6c8f4f 1px, transparent 1px)', backgroundSize: '20px 20px' }}>
      {/* Invisible audio for timer notification */}
      <audio ref={audioRef} src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" preload="auto" />

      {/* Header */}
      <header className="max-w-6xl mx-auto mb-8 text-center flex flex-col items-center">
        <a href="/" className="font-pixel text-xs text-[#5c3a21] mb-4 opacity-70 hover:opacity-100 transition-opacity" style={{textDecoration:'none'}}>
          &larr; Companheiro de Pesquisa
        </a>
        <div className="retro-panel inline-block px-8 py-4 mb-4 transform -rotate-1 relative">
          <div className="absolute -top-3 -left-3 w-6 h-6 bg-red-600 rounded-full border-4 border-[#854c30] shadow-sm"></div>
          <div className="absolute -top-3 -right-3 w-6 h-6 bg-red-600 rounded-full border-4 border-[#854c30] shadow-sm"></div>
          <h1 className="text-3xl md:text-5xl font-pixel text-[#5c3a21] font-bold tracking-wide">
            PAINEL DA TESE
          </h1>
          <p className="font-pixel text-[#854c30] text-sm md:text-base uppercase tracking-widest mt-2">Iconocracy &bull; Rumo a Defesa</p>
        </div>
      </header>

      <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">

        {/* LEFT COLUMN: Active Tools */}
        <div className="lg:col-span-5 flex flex-col gap-6">

          {/* POMODORO */}
          <div className="retro-panel p-6 flex flex-col items-center">
            <h2 className="font-pixel text-xl text-[#5c3a21] mb-4 flex items-center gap-2">
              <Icon name="Target" size={24}/> TEMPORIZADOR
            </h2>

            <div className="flex gap-2 mb-6">
              <button onClick={() => switchMode('Trabalho')} className={`retro-btn text-xs px-3 py-1 ${timerMode === 'Trabalho' ? 'bg-[#5c3a21] text-[#ffeba1]' : ''}`}>TRABALHO</button>
              <button onClick={() => switchMode('Pausa')} className={`retro-btn text-xs px-3 py-1 ${timerMode === 'Pausa' ? 'bg-[#5c3a21] text-[#ffeba1]' : ''}`}>PAUSA</button>
            </div>

            <div className="text-6xl md:text-7xl font-pixel font-bold text-[#2c3e50] mb-6 drop-shadow-md">
              {formatTime(timeLeft)}
            </div>

            <div className="flex gap-4">
              <button onClick={toggleTimer} className="retro-btn flex items-center justify-center w-12 h-12 bg-green-500 hover:bg-green-600">
                <Icon name={isActive ? "Pause" : "Play"} size={20} />
              </button>
              <button onClick={resetTimer} className="retro-btn flex items-center justify-center w-12 h-12 bg-red-500 hover:bg-red-600 text-white">
                <Icon name="RotateCcw" size={20} />
              </button>
            </div>

            <button onClick={() => setFocusMode(true)} className="mt-6 w-full retro-btn bg-[#3498db] hover:bg-[#2980b9] text-white flex items-center justify-center gap-2 py-3">
              <Icon name="BookOpen" size={18} /> MODO CONCENTRACAO
            </button>
          </div>

          {/* WORD COUNT */}
          <div className="retro-panel p-6">
            <div className="flex justify-between items-center mb-4">
              <h2 className="font-pixel text-xl text-[#5c3a21] flex items-center gap-2">
                <Icon name="PenTool" size={20}/> ESCRITA DIARIA
              </h2>
              <span className="font-pixel font-bold text-[#854c30]">{wordCount}/{dailyGoal}</span>
            </div>

            {/* Progress bar */}
            <div className="w-full h-6 border-4 border-[#854c30] bg-[#e0d3b6] relative mb-4 shadow-inner">
              <div
                className="h-full bg-[#4cd137] transition-all duration-500"
                style={{ width: `${Math.min((wordCount / dailyGoal) * 100, 100)}%` }}
              />
              <div className="absolute inset-0 flex items-center justify-center font-pixel text-xs font-bold text-[#5c3a21]">
                {Math.round((wordCount / dailyGoal) * 100)}%
              </div>
            </div>

            <textarea
              className="w-full bg-[#fdfbf3] border-2 border-[#854c30] p-3 text-sm focus:outline-none focus:border-[#d35400] resize-y"
              rows="4"
              placeholder="Rascunho rapido ou notas de investigacao..."
              value={draftText}
              onChange={(e) => setDraftText(e.target.value)}
            />
          </div>
        </div>

        {/* RIGHT COLUMN: Planning */}
        <div className="lg:col-span-7 flex flex-col gap-6">

          {/* NEXT UP */}
          <div className="retro-panel p-6 border-l-8 border-l-[#e67e22]">
            <h2 className="font-pixel text-xl text-[#5c3a21] mb-4 flex items-center gap-2">
              <Icon name="AlertTriangle" size={24} className="text-[#e67e22]"/> O QUE FAZER A SEGUIR?
            </h2>
            <p className="text-sm font-bold text-[#854c30] mb-4 uppercase tracking-wide font-pixel">Prazos nas proximas 2 semanas</p>

            {isLoading ? (
              <p className="font-pixel animate-pulse">A comunicar com a guilda dos investigadores...</p>
            ) : urgentMilestones.length > 0 ? (
              <ul className="space-y-3">
                {urgentMilestones.map(m => (
                  <li key={m.id} className="bg-[#fdfbf3] border-2 border-[#e67e22] p-3 flex justify-between items-center transform transition-transform hover:translate-x-1 shadow-[2px_2px_0_0_#d35400]">
                    <div className="flex items-center gap-3">
                      <Icon name="ChevronRight" size={18} className="text-[#e67e22]"/>
                      <span className="font-semibold text-[#2c3e50]">{m.title}</span>
                    </div>
                    <span className="text-xs font-pixel bg-[#e67e22] text-white px-2 py-1 rounded-sm border border-[#d35400]">
                      {new Date(m.deadline).toLocaleDateString('pt-PT', { day: '2-digit', month: 'short' })}
                    </span>
                  </li>
                ))}
              </ul>
            ) : (
              <div className="bg-[#fdfbf3] border-2 border-green-600 p-4 text-center text-green-700 font-pixel">
                Nenhum prazo urgente. Continue a explorar o corpus tranquilamente!
              </div>
            )}
          </div>

          {/* MILESTONES */}
          <div className="retro-panel p-6 flex-1">
            <h2 className="font-pixel text-xl text-[#5c3a21] mb-4 flex items-center gap-2">
              <Icon name="ListTodo" size={24}/> ETAPAS DA TESE
            </h2>

            {isLoading ? (
              <p className="font-pixel animate-pulse">A descodificar metadados...</p>
            ) : (
              <div className="space-y-2 overflow-y-auto max-h-[300px] pr-2 custom-scrollbar">
                {milestones.map(m => (
                  <div
                    key={m.id}
                    onClick={() => toggleMilestone(m.id)}
                    className={`p-3 border-2 cursor-pointer flex items-center gap-3 transition-all ${m.completed ? 'bg-[#e0d3b6] border-[#bdc3c7] opacity-60' : 'bg-[#fdfbf3] border-[#854c30] hover:bg-white shadow-[2px_2px_0_0_#854c30]'}`}
                  >
                    <div className={`w-6 h-6 border-2 border-[#854c30] flex items-center justify-center flex-shrink-0 ${m.completed ? 'bg-green-500' : 'bg-white'}`}>
                      {m.completed && <Icon name="CheckCircle2" size={16} className="text-white"/>}
                    </div>
                    <div className="flex-1">
                      <p className={`font-semibold text-sm ${m.completed ? 'line-through text-gray-500' : 'text-[#2c3e50]'}`}>{m.title}</p>
                      <p className="text-xs text-gray-500 font-pixel tracking-wide mt-1">
                        Prazo: {new Date(m.deadline).toLocaleDateString('pt-PT')}
                      </p>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
